<!DOCTYPE html>
<html>
<head>
<title>RNT Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
margin:0;
background:#202123;
color:white;
}

header{
background:#10a37f;
padding:15px;
text-align:center;
font-size:22px;
}

#chat{
height:70vh;
overflow:auto;
padding:10px;
}

.message{
padding:10px;
margin:10px;
border-radius:10px;
max-width:70%;
}

.user{
background:#10a37f;
margin-left:auto;
}

.ai{
background:#444;
}

#inputArea{
display:flex;
padding:10px;
background:#333;
}

#msg{
flex:1;
padding:10px;
}

button{
padding:10px;
background:#10a37f;
border:none;
color:white;
}
</style>
</head>

<body>

<header>RNT Chat</header>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

<script>

function send(){
let msg=document.getElementById("msg").value;

let chat=document.getElementById("chat");

chat.innerHTML += `<div class="message user">${msg}</div>`;

chat.innerHTML += `<div class="message ai">AI reply coming soon...</div>`;

document.getElementById("msg").value="";
}

</script>

</body>
</html>
