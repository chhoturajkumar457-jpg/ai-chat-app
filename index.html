<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat RNT</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#202123;
color:white;
padding:10px;
}

#sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
background:#f5f5f5;
}

header{
background:#10a37f;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

/* MESSAGES */

.message{
max-width:70%;
padding:10px;
margin:8px;
border-radius:10px;
}

.user{
background:#10a37f;
color:white;
margin-left:auto;
}

.ai{
background:#e5e5e5;
}

/* INPUT */

#inputArea{
display:flex;
padding:10px;
background:white;
}

#msg{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px;
margin-left:5px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar">

<button onclick="newChat()">➕ New Chat</button>

<div id="history"></div>

</div>

<!-- MAIN -->

<div id="main">

<header>Chat RNT</header>

<div id="chat"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

<button onclick="voice()">🎤</button>

</div>

</div>

<script>

let chat=document.getElementById("chat")

let historyDiv=document.getElementById("history")

function addMessage(text,type){

let div=document.createElement("div")

div.className="message "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

saveChat()

}

function send(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(text=="") return

addMessage(text,"user")

input.value=""

setTimeout(()=>{

addMessage("AI reply: "+text,"ai")

},500)

}

function voice(){

let rec=new webkitSpeechRecognition()

rec.lang="en-US"

rec.start()

rec.onresult=function(e){

document.getElementById("msg").value=e.results[0][0].transcript

}

}

function saveChat(){

localStorage.setItem("chatRNT",chat.innerHTML)

}

function loadChat(){

let data=localStorage.getItem("chatRNT")

if(data){
chat.innerHTML=data
}

}

function newChat(){

chat.innerHTML=""

}

loadChat()

</script>

</body>
  </html>
