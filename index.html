<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat RNT</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#10a37f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

#chat{
height:70vh;
overflow-y:auto;
padding:10px;
}

.message{
max-width:70%;
padding:10px;
margin:8px;
border-radius:10px;
}

.user{
background:#10a37f;
color:white;
margin-left:auto;
}

.ai{
background:#e0e0e0;
}

#inputArea{
display:flex;
padding:10px;
background:white;
}

#msg{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px;
margin-left:5px;
}

</style>

</head>

<body>

<header>Chat RNT</header>

<div id="chat"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

<button onclick="voice()">🎤</button>

<button onclick="clearChat()">🗑</button>

</div>

<script>

let chat=document.getElementById("chat")

function loadChat(){

let data=localStorage.getItem("chatRNT")

if(data){
chat.innerHTML=data
}

}

function saveChat(){
localStorage.setItem("chatRNT",chat.innerHTML)
}

function addMessage(text,type){

let div=document.createElement("div")

div.className="message "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

saveChat()

}

function send(){

let input=document.getElementById("msg")

let text=input.value.trim()

if(text=="") return

addMessage(text,"user")

input.value=""

aiReply(text)

}

function aiReply(msg){

let reply="You said: "+msg

setTimeout(()=>{

addMessage(reply,"ai")

},500)

}

function clearChat(){

localStorage.removeItem("chatRNT")

chat.innerHTML=""

}

function voice(){

let recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(e){

let text=e.results[0][0].transcript

document.getElementById("msg").value=text

}

}

loadChat()

</script>

</body>
</html>
